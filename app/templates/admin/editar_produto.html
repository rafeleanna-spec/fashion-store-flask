{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Editar Produto</h2>

    <form method="POST" enctype="multipart/form-data">
        <div class="mb-3">
            <label>Nome</label>
            <input type="text" name="nome" class="form-control" value="{{ produto.nome }}" required>
        </div>

        <div class="mb-3">
            <label>Preço</label>
            <input type="number" step="0.01" name="preco" class="form-control" value="{{ produto.preco }}" required>
        </div>

        <div class="mb-3">
            <label>Descrição</label>
            <textarea name="descricao" class="form-control" required>{{ produto.descricao }}</textarea>
        </div>

        <div class="mb-3">
            <label>Imagem Atual</label><br>
            <img src="{{ url_for('static', filename='uploads/' + produto.imagem) }}" width="120">
        </div>

        <div class="mb-3">
            <label>Nova Imagem (opcional)</label>
            <input type="file" name="imagem" class="form-control">
        </div>

        <button class="btn btn-primary">Salvar Alterações</button>
    </form>
</div>
{% endblock %}
